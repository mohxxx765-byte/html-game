<!DOCTYPE html>
<html>
<head>
<title>Mini Oyun</title>
<style>
body{
text-align:center;
font-family:Arial;
}

#enemy{
width:50px;
height:50px;
background:red;
position:absolute;
left:100px;
top:100px;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Düşmanı Yakala</h2>
<p>Puan: <span id="puan">0</span></p>

<div id="enemy"></div>

<script>
let puan = 0;
let enemy = document.getElementById("enemy");

enemy.onclick = function(){
puan += 1;
document.getElementById("puan").innerText = puan;

let x = Math.random() * 500;
let y = Math.random() * 400;

enemy.style.left = x + "px";
enemy.style.top = y + "px";
}
</script>

</body>
</html>
